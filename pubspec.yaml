name: hutankita
description: Platform pemantauan dan pemulihan hutan Indonesia.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.3.2

  # Fonts
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.3.1

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  lottie: ^3.1.0

  # Utilities
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  timeago: ^3.6.1
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
